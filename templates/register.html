

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員登録</title>
</head>
<body>
    <h1>メールアドレス登録</h1>
    {% if error %}
        <p style="color: red";>エラー:{{error}}</p>
    {% endif %}

    <form action="/register" method="post">
        <label for="email">メールアドレス：</label>
        <input type="email" id="email" name="email"  required>

        <button type="submit">登録する</button>
    </form>

    <p><a href="/">商品一覧に戻る</a></p>
</body>

</html>
