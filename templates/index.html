<!--
データ連携: Pythonで作った items の中身が、HTMLの item.name の部分に正しく流し込まれているか。
動的生成: 商品が3つあれば、HTML側も自動的に3つの <li> タグを作ってくれるか。
-->

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>商品一覧</title></head>
<body> <h1>商品一覧</h1>
    <ul>
        {# 1. ループ処理：itemsの中身を1つずつ「item」という名前で取り出す#}
        {% for item in items %}
            {# 2. HTMLに届いた大きなバケツ items から、1匹ずつ魚を取り出して、それを item と名付けてお皿（<li>）に盛り付けます。item[0]はID、item[1]は商品名、item[2]は価格#}
            <li>{{item[1]}}:{{item[2]}}円</li>
        {% endfor %}
    </ul>
</body>
</html>
