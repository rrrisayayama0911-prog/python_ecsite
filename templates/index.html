<!--
データ連携: Pythonで作った items の中身が、HTMLの item.name の部分に正しく流し込まれているか。
動的生成: 商品が3つあれば、HTML側も自動的に3つの <li> タグを作ってくれるか。
-->

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>商品一覧</title></head>


<body> <h1>商品一覧</h1>
    <form action="/" method="get" style="margin-bottom:20px;">
        <input type=""text name="keyword"placeholder="商品名を入力(例：バニラ)"style="padding:5px;width250px;">
        <button type="submit" style="padding:5px 10px;">検索</button>
        <a href="/" style="margin-left:10px;text-decoration:none;color:#666;">クリア</a>
    </form>

       <div style="display: flex; flex-direction: column; gap: 15px;"> {% for item in items %}
            {# 商品1つ分のボックス（無駄なタグを排除したスッキリ版） #}
            <div style="border: 1px solid #ccc; padding: 5px; display: flex; align-items: center; width: 600px; background-color: #fff; box-sizing: border-box;">

                {# 左側：画像 #}
                <div style="width: 150px; height: 150px; flex-shrink: 0; margin-right: 30px;">
                    <img src="{{ item[4] }}" alt="{{ item[1] }}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
                </div>

                {# 右側：商品のテキスト情報 #}
                <div style="font-size: 16px; line-height: 1.6; flex-grow: 1;">
                    <h3 style="margin: 0 0 10px 0; font-size: 20px; color: #333;">{{ item[1] }}</h3>
                    <p style="margin: 5px 0; color: #555;"><strong>価格：</strong>{{ item[2] }}円</p>
                    <p style="margin: 5px 0; color: #555;"><strong>在庫：</strong>{{ item[3] }}個</p>
                </div>

            </div>
        {% endfor %}
    </div>
</body>
</html>
