<!--
データ連携: Pythonで作った items の中身が、HTMLの item.name の部分に正しく流し込まれているか。
動的生成: 商品が3つあれば、HTML側も自動的に3つの <li> タグを作ってくれるか。
-->

<h1>商品一覧</h1>
<ul>
    {# 1. ループ処理：itemsの中身を1つずつ「item」という名前で取り出す#}
    {% for item in items %}
        {# 2. 以下は予約席。Jinja2 (テンプレートエンジン)がPythonのデータをHTMLの「予約席」へ流し込む。変数の表示：item（辞書）の中から、特定のキー（nameやprice）を呼び出す#}
        <li>{{item.name}}:{{item.price}}円</li>
    {% endfor %}
</ul>
